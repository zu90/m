<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        .container { max-width: 1300px; margin: 0 auto; }
        .tabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; }

        .tab-btn.active { background: #d32f2f; color: #fff; box-shadow: 0 0 10px rgba(211, 47, 47, 0.5); }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        select, input, button { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: #fff; font-size: 14px; }

        .copy-main:hover { background: #b71c1c; transform: scale(1.05); }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: #d32f2f; transform: translateY(-5px); }
        .card img { max-width: 100%; height: auto; border-radius: 5px; background: #000; min-height: 200px; }
        .card p { margin: 10px 0 5px; font-size: 13px; color: #fff; font-weight: bold; }
        .card span { font-size: 11px; color: #888; display: block; word-break: break-all; margin-bottom: 10px; }
        .copy-btn { width: 100%; background: #444; color: #fff; border: none; padding: 5px; margin-top: 5px; border-radius: 3px; cursor: pointer; font-size: 11px; }
        .copy-btn:hover { background: #666; }

    <div class="tabs" id="tabContainer">

    <div class="controls">

            <option value="분노">감정: 분노</option>

            <option value="슬픔">감정: 슬픔</option>
            <option value="당황">감정: 당황</option>

        <button class="copy-main" onclick="copyAll()">현재 리스트 주소 전체 복사</button>
    </div>

    <div id="gallery" class="gallery"></div>
</div>

        monster: "마안수,마기짐승,혈의망령,혈시,비천야자,유사사충,사귀,철부리독수리,연화식혼괴,심연현수,흑수아귀,수귀,덩굴포식식물,안개식인림,청목영사,기생포자,수정령원,바위거북,수룡어,수압영수,결정수호령,응룡,청룡,기린,황금석상무사,보물수호귀,독수호수,환각보석괴,빙혼수,천년빙익황,뇌정백린호,빙아랑,여왕충,참수사마귀,천독지주,식혈개미군,환각독두꺼비,암석철웅,강철멧돼지,비영살쾡이,무뢰파락호,명계시견,초혼괴인,청동강시,청죽목괴,죽엽환영,철우취조,죽림비서,흑풍비적,철갑산도,독영궁사,혈사검객,괴목혼박,석갑천산수,혈린거파,청안비사,귀각거아귀,천공침어,환각유령어,명해전기어,산림맹호,광폭불곰,철갑흑곰,암벽광원,석갑거구,천공수리,철아광돈,강철악어,들쥐,산적패_기습,살수_기습,들개,독사,지네,전갈,까마귀떼,흑야조,청익조,천안금오,천공비조,적화조".split(','),

    function showCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('emotionSelect').style.display = cat === 'char' ? 'inline-block' : 'none';
        render();
    }

    function render() {
        const gallery = document.getElementById('gallery');
        const search = document.getElementById('searchInput').value.toLowerCase();
        const emo = document.getElementById('emotionSelect').value;
        gallery.innerHTML = '';

        db[currentCategory].forEach(item => {
            if (!item.toLowerCase().includes(search)) return;

            let fileName = item;
            if (currentCategory === 'char') fileName += `_${emo}`;
            const fullUrl = `${BASE_URL}${fileName}.png`;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${fullUrl}" onerror="this.src='https://via.placeholder.com/280x200?text=이미지+대기중'">
                <p>${fileName}</p>
                <span>${fullUrl}</span>
                <button class="copy-btn" onclick="copyText('${fullUrl}')">주소 복사</button>
                <button class="copy-btn" onclick="copyText('![${fileName}](${fullUrl})')">마크다운 복사</button>
            `;
            gallery.appendChild(card);
        });
    }

    function copyText(text) {
        navigator.clipboard.writeText(text);
        alert('무림의 정보가 복사되었습니다!');
    }

    function copyAll() {
        const links = Array.from(document.querySelectorAll('.card span')).map(s => s.innerText).join('\n');
        navigator.clipboard.writeText(links);
        alert('현재 화면의 모든 주소가 복사되었습니다!');
    }

    render();
</script>
